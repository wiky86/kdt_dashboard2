<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>훈련 과정 통계 분석</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
    <div class="container container--wide">
        <!-- 헤더 -->
        <div class="header">
            <h1><i class="fas fa-chart-bar"></i> 훈련 과정 통계 분석</h1>
            <div class="header-controls">
                <a href="index.html" class="btn">
                    <i class="fas fa-arrow-left"></i> 목록으로 돌아가기
                </a>
                <button class="btn" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> 새로고침
                </button>
            </div>
        </div>
        
        <!-- 데이터 검색 필터 -->
        <div class="card">
            <div class="card-header-row">
                <h3><i class="fas fa-search"></i> 데이터 검색 필터</h3>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateStatistics()">
                        <i class="fas fa-chart-line"></i> 통계 생성
                    </button>
                    <button class="btn" onclick="clearAllFilters()">
                        <i class="fas fa-times"></i> 필터 초기화
                    </button>
                </div>
            </div>
            
            <!-- 기본 검색 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">기관명</label>
                    <input type="text" id="institutionSearch" placeholder="기관명을 입력하세요" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">과정명</label>
                    <input type="text" id="courseSearch" placeholder="과정명을 입력하세요" class="form-input">
                </div>
            </div>
            
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">NCS직무</label>
                    <select id="ncsJobSelect" class="form-select">
                        <option value="">전체 NCS직무</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">훈련시간 (시간 이상)</label>
                    <input type="number" id="minHours" placeholder="최소 시간" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">시간당훈련비 (원 이상)</label>
                    <input type="number" id="minHourlyFee" placeholder="최소 비용" class="form-input">
                </div>
            </div>
            
            <!-- 고급 필터 -->
            <div class="filter-section">
                <div class="filter-title filter-title--toggle" onclick="toggleAdvancedFilters()">
                    <i class="fas fa-filter"></i> 고급 필터
                    <i class="fas fa-chevron-down chevron-icon" id="advancedFilterIcon"></i>
                </div>
                <div id="advancedFilters" style="display: none;">
                    <div class="form-row-3">
                        <div class="form-group">
                            <label class="form-label">수료율 (% 이상)</label>
                            <input type="number" id="minCompletionRate" placeholder="최소 수료율" class="form-input" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">취업률 (% 이상)</label>
                            <input type="number" id="minEmploymentRate" placeholder="최소 취업률" class="form-input" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">만족도 (이상)</label>
                            <input type="number" id="minSatisfaction" placeholder="최소 만족도" class="form-input" min="0" max="5" step="0.1">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 통계 설정 -->
        <div class="card">
            <h3><i class="fas fa-cog"></i> 통계 설정</h3>
            
            <div class="stats-controls">
                <!-- 가로축 설정 -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-chart-line"></i> 가로축 (시간축)
                    </div>
                    <div class="form-group">
                        <label class="form-label">집계 기간</label>
                        <select id="timeGrouping" class="form-select" onchange="updateDateRangeOptions()">
                            <option value="monthly">월별</option>
                            <option value="quarterly">분기별</option>
                            <option value="halfyearly">반기별</option>
                            <option value="yearly">연도별</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">시작 시점</label>
                            <select id="startPeriod" class="form-select">
                                <!-- 동적으로 생성됩니다 -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">종료 시점</label>
                            <select id="endPeriod" class="form-select">
                                <!-- 동적으로 생성됩니다 -->
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 세로축 설정 -->
                <div class="filter-section">
                    <div class="filter-title">
                        <i class="fas fa-chart-bar"></i> 세로축 (지표)
                    </div>
                    <div class="form-group">
                        <label class="form-label">표시 지표</label>
                        <select id="metricType" class="form-select">
                            <option value="recruitmentRate">모집률 (%)</option>
                            <option value="employmentRate">취업률 (%)</option>
                            <option value="completionRate">수료율 (%)</option>
                            <option value="satisfaction">만족도</option>
                            <option value="totalCapacity">총 모집정원</option>
                            <option value="totalConfirmed">수강확정 인원</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateStatistics()">
                    <i class="fas fa-chart-line"></i> 통계 생성
                </button>
                <button class="btn" onclick="exportStatistics()" id="exportStatsBtn" style="display: none;">
                    <i class="fas fa-download"></i> 통계 내보내기
                </button>
            </div>
        </div>
        
        <!-- 통계 차트 -->
        <div class="chart-container" id="chartContainer" style="display: none;">
            <div class="chart-title" id="chartTitle">통계 차트</div>
            <div class="chart-wrapper">
                <canvas id="statisticsChart"></canvas>
            </div>
            
            <!-- 필터 요약 -->
            <div id="filterSummary"></div>
            
            <!-- 통계 요약 -->
            <div class="stats-summary" id="statsSummary">
                <!-- 통계 요약 카드들이 여기에 동적으로 삽입됩니다 -->
            </div>
        </div>
        
        <!-- 로딩 상태 -->
        <div id="loadingState" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            통계 데이터를 불러오는 중...
        </div>
    </div>
    
    <script src="stats.js"></script>
</body>
</html>
