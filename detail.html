<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>훈련 과정 상세 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> 훈련 과정 상세 정보</h1>
            <a href="index.html" class="btn">
                <i class="fas fa-arrow-left"></i> 목록으로 돌아가기
            </a>
        </div>
        
        <!-- 상세 정보 -->
        <div id="detailContent">
            <!-- 차트 -->
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i> 개강일별 수강확정인원 및 모집률 변동
                </div>
                <div class="chart-wrapper">
                    <canvas id="enrollmentChart"></canvas>
                </div>
            </div>
            
            <!-- 기본 정보 -->
            <div class="card">
                <h3><i class="fas fa-info-circle"></i> 기본 정보</h3>
                <div class="info-grid" id="basicInfo">
                    <!-- 기본 정보가 여기에 동적으로 삽입됩니다 -->
                </div>
            </div>
            
            <!-- 회차별 상세 정보 -->
            <div class="card">
                <h3><i class="fas fa-list"></i> 회차별 상세 정보</h3>
                <div id="sessionsList">
                    <!-- 회차별 정보가 여기에 동적으로 삽입됩니다 -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="detail.js"></script>
</body>
</html>
