<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유비온 디지털교육센터</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> 유비온 디지털교육센터</h1>
            <div class="header-controls">
                <button class="btn" onclick="window.location.href='stats.html'">
                    <i class="fas fa-chart-bar"></i> 통계 분석
                </button>
                <button class="btn" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> 새로고침
                </button>
                <button class="btn" onclick="showSettings()">
                    <i class="fas fa-cog"></i> 설정
                </button>
            </div>
        </div>
        
        <!-- 메인 콘텐츠 -->
        <div class="card">
            <div class="card-header-row">
                <h3><i class="fas fa-chart-line"></i> 훈련 과정 데이터</h3>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="performSearch()">
                        <i class="fas fa-search"></i> 검색
                    </button>
                    <button class="btn" onclick="clearSearch()">
                        <i class="fas fa-times"></i> 초기화
                    </button>
                </div>
            </div>
            
            <!-- 검색 폼 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">기관명</label>
                    <input type="text" id="institutionSearch" placeholder="기관명을 입력하세요" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">과정명</label>
                    <input type="text" id="courseSearch" placeholder="과정명을 입력하세요" class="form-input">
                </div>
            </div>
            
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">NCS직무</label>
                    <select id="ncsJobSelect" class="form-select">
                        <option value="">전체 NCS직무</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">훈련시간</label>
                    <div class="range-input">
                        <input type="number" id="minHours" placeholder="최소" class="form-input">
                        <span class="range-separator">~</span>
                        <input type="number" id="maxHours" placeholder="최대" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">시간당훈련비 (원)</label>
                    <div class="range-input">
                        <input type="number" id="minHourlyFee" placeholder="최소" class="form-input">
                        <span class="range-separator">~</span>
                        <input type="number" id="maxHourlyFee" placeholder="최대" class="form-input">
                    </div>
                </div>
            </div>
            
            <!-- 고급 필터 -->
            <div class="filter-section">
                <div class="filter-title filter-title--toggle" onclick="toggleAdvancedFilters()">
                    <i class="fas fa-filter"></i> 고급 필터 
                    <i class="fas fa-chevron-down chevron-icon" id="advancedFilterIcon"></i>
                </div>
                <div id="advancedFilters" style="display: none;">
                    <div class="form-row-3">
                        <div class="form-group">
                            <label class="form-label">수료율 (이상)</label>
                            <input type="number" id="minCompletionRate" placeholder="최소 수료율" class="form-input" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">취업률 (이상)</label>
                            <input type="number" id="minEmploymentRate" placeholder="최소 취업률" class="form-input" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label">만족도 (이상)</label>
                            <input type="number" id="minSatisfaction" placeholder="최소 만족도" class="form-input" min="0" max="5" step="0.1">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">개강일 시작</label>
                            <input type="date" id="startDateFrom" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">개강일 종료</label>
                            <input type="date" id="startDateTo" class="form-input">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 내보내기 버튼들 -->
            <div class="flex-end mt-16">
                <button class="btn" onclick="exportToExcel()" id="exportExcelBtn" style="display: none;">
                    <i class="fas fa-file-excel"></i> Excel 내보내기
                </button>
                <button class="btn" onclick="exportToPDF()" id="exportPDFBtn" style="display: none;">
                    <i class="fas fa-file-pdf"></i> PDF 내보내기
                </button>
            </div>
            
            <!-- 검색 결과 -->
            <div id="searchResults">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    최신 훈련 과정 데이터를 불러오는 중...
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
